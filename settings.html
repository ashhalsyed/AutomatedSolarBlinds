<!DOCTYPE html>
<html lang="en">
  <head>
    <title>solar blinds</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Orbitron"
      href="https://fonts.googleapis.com/css?family=Quicksand"
    />
  </head>
  <body onload="setTheme()">
    <div class="navbar">
      <img
        onclick="openNav()"
        class="sidebar_logo"
        src="media/sidebar.svg"
        alt="sidebar icon"
      />
    </div>
    <div class="settings">
      <img
        style="display: none"
        src
        onerror="updateSettings()"
        alt="to trigger onload on div"
      />
      <div class="theme">
        <p class="theme_tag">Theme</p>
        <div onclick="toggleTheme()" class="toggle_holder" id="toggle_holder">
          <button class="toggle_circle" id="toggle_circle"></button>
        </div>
      </div>
    </div>
    <div id="mySidenav" class="sidenav">
      <img
        onclick="closeNav()"
        class="close_logo"
        src="media/close.svg"
        alt="close icon"
      />
      <a href="index.html">Home</a>
      <section>
        <div class="divider"></div>
      </section>
      <a href="aboutus.html">About Us</a>
      <section>
        <div class="divider"></div>
      </section>
      <a href="faq.html">FAQ</a>
      <section>
        <div class="divider"></div>
      </section>
      <a href="settings.html">Settings</a>
      <section>
        <div class="divider"></div>
      </section>
      <img class="logo" src="media/logo.svg" alt="logo" />
    </div>
  </body>
</html>
